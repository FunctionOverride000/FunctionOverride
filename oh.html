<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOSHT OG Image Generator</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a0a0a;
    font-family: 'Courier New', monospace;
    color: #fff;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 20px;
    gap: 32px;
  }

  h1 {
    color: #00f3ff;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* ─── CANVAS PREVIEW ─── */
  #preview-wrap {
    position: relative;
    border: 1px solid #00f3ff33;
    box-shadow: 0 0 40px rgba(0,243,255,0.08);
  }

  canvas {
    display: block;
    max-width: 100%;
    height: auto;
  }

  /* ─── CONTROLS ─── */
  .controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    width: 100%;
    max-width: 620px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .field.full { grid-column: 1 / -1; }

  label {
    font-size: 10px;
    letter-spacing: 2px;
    color: #00f3ff99;
    text-transform: uppercase;
  }

  input, select, textarea {
    background: #0d1117;
    border: 1px solid #ffffff15;
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 10px 14px;
    outline: none;
    border-radius: 2px;
    transition: border-color 0.2s;
  }

  input:focus, select:focus, textarea:focus {
    border-color: #00f3ff44;
  }

  textarea { resize: vertical; min-height: 60px; }

  input[type="color"] {
    padding: 4px 8px;
    height: 40px;
    cursor: pointer;
  }

  /* ─── BUTTONS ─── */
  .actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  button {
    font-family: 'Courier New', monospace;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 12px 28px;
    border: none;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.2s;
    font-weight: 700;
  }

  .btn-primary {
    background: #00f3ff;
    color: #000;
  }
  .btn-primary:hover { background: #00d4e0; }

  .btn-secondary {
    background: transparent;
    color: #00f3ff;
    border: 1px solid #00f3ff44;
  }
  .btn-secondary:hover { background: #00f3ff11; }

  .hint {
    font-size: 10px;
    color: #444;
    letter-spacing: 1px;
    text-align: center;
  }
</style>
</head>
<body>

<h1>⬡ FOSHT — OG Image Generator</h1>

<div id="preview-wrap">
  <canvas id="canvas" width="1200" height="630"></canvas>
</div>

<div class="controls">
  <div class="field">
    <label>Name / Title</label>
    <input type="text" id="inp-name" value="Function Override Shift" />
  </div>
  <div class="field">
    <label>Role / Tagline</label>
    <input type="text" id="inp-role" value="Web Developer & AI Specialist" />
  </div>
  <div class="field full">
    <label>Description</label>
    <textarea id="inp-desc">Building digital ecosystems with React, Next.js & AI — Based in Lampung, Indonesia</textarea>
  </div>
  <div class="field">
    <label>URL</label>
    <input type="text" id="inp-url" value="fosht.vercel.app" />
  </div>
  <div class="field">
    <label>Accent Color</label>
    <input type="color" id="inp-accent" value="#00f3ff" />
  </div>
  <div class="field">
    <label>Logo Image (PNG)</label>
    <input type="file" id="inp-logo" accept="image/*" />
  </div>
  <div class="field">
    <label>Variant</label>
    <select id="inp-variant">
      <option value="default">Default — Dark Cyber</option>
      <option value="grid">Grid — Blueprint</option>
      <option value="minimal">Minimal — Clean</option>
    </select>
  </div>
</div>

<div class="actions">
  <button class="btn-primary" onclick="render()">⟳ REFRESH PREVIEW</button>
  <button class="btn-secondary" onclick="download()">↓ DOWNLOAD og-image.png</button>
</div>

<p class="hint">Download → save as /public/og-image.png in your Next.js project</p>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const W = 1200, H = 630;

let logoImg = null;

document.getElementById('inp-logo').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => { logoImg = img; render(); };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// Auto render on any input change
document.querySelectorAll('input, select, textarea').forEach(el => {
  el.addEventListener('input', render);
});

function hexToRgb(hex) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return { r, g, b };
}

function render() {
  const name    = document.getElementById('inp-name').value;
  const role    = document.getElementById('inp-role').value;
  const desc    = document.getElementById('inp-desc').value;
  const url     = document.getElementById('inp-url').value;
  const accent  = document.getElementById('inp-accent').value;
  const variant = document.getElementById('inp-variant').value;
  const { r, g, b } = hexToRgb(accent);

  ctx.clearRect(0, 0, W, H);

  if (variant === 'default') renderDefault(name, role, desc, url, accent, r, g, b);
  else if (variant === 'grid') renderGrid(name, role, desc, url, accent, r, g, b);
  else if (variant === 'minimal') renderMinimal(name, role, desc, url, accent, r, g, b);
}

// ── VARIANT 1: Default Dark Cyber
function renderDefault(name, role, desc, url, accent, r, g, b) {
  // Background
  ctx.fillStyle = '#050505';
  ctx.fillRect(0, 0, W, H);

  // Diagonal gradient blob kiri
  const grad1 = ctx.createRadialGradient(200, 300, 0, 200, 300, 500);
  grad1.addColorStop(0, `rgba(${r},${g},${b},0.12)`);
  grad1.addColorStop(1, 'transparent');
  ctx.fillStyle = grad1;
  ctx.fillRect(0, 0, W, H);

  // Blob kanan bawah
  const grad2 = ctx.createRadialGradient(1050, 500, 0, 1050, 500, 350);
  grad2.addColorStop(0, `rgba(${r},${g},${b},0.07)`);
  grad2.addColorStop(1, 'transparent');
  ctx.fillStyle = grad2;
  ctx.fillRect(0, 0, W, H);

  // Scanlines
  ctx.globalAlpha = 0.04;
  for (let y = 0; y < H; y += 4) {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, y, W, 2);
  }
  ctx.globalAlpha = 1;

  // Top border bar
  const topBar = ctx.createLinearGradient(0, 0, W, 0);
  topBar.addColorStop(0, 'transparent');
  topBar.addColorStop(0.3, accent);
  topBar.addColorStop(0.7, accent);
  topBar.addColorStop(1, 'transparent');
  ctx.fillStyle = topBar;
  ctx.fillRect(0, 0, W, 3);

  // Bottom border bar
  ctx.fillStyle = topBar;
  ctx.fillRect(0, H - 3, W, 3);

  // Left accent line
  ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
  ctx.fillRect(60, 60, 2, H - 120);

  // Badge top-left
  ctx.fillStyle = `rgba(${r},${g},${b},0.1)`;
  roundRect(ctx, 80, 60, 220, 36, 3);
  ctx.fill();
  ctx.strokeStyle = `rgba(${r},${g},${b},0.3)`;
  ctx.lineWidth = 1;
  roundRect(ctx, 80, 60, 220, 36, 3);
  ctx.stroke();

  ctx.fillStyle = accent;
  ctx.font = '11px "Courier New"';
  ctx.letterSpacing = '3px';
  ctx.fillText('FOSHT SYSTEM v2.0', 100, 83);
  ctx.letterSpacing = '0px';

  // Logo
  if (logoImg) {
    const logoSize = 110;
    const lx = 80, ly = 130;
    // Glow behind logo
    const logoGlow = ctx.createRadialGradient(lx + logoSize/2, ly + logoSize/2, 0, lx + logoSize/2, ly + logoSize/2, logoSize);
    logoGlow.addColorStop(0, `rgba(${r},${g},${b},0.3)`);
    logoGlow.addColorStop(1, 'transparent');
    ctx.fillStyle = logoGlow;
    ctx.fillRect(lx - 30, ly - 30, logoSize + 60, logoSize + 60);
    ctx.drawImage(logoImg, lx, ly, logoSize, logoSize);
  }

  // Main name
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 68px "Courier New"`;
  ctx.fillText(name, 80, 310);

  // Accent underline under name
  const nameWidth = ctx.measureText(name).width;
  const underGrad = ctx.createLinearGradient(80, 0, 80 + nameWidth, 0);
  underGrad.addColorStop(0, accent);
  underGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = underGrad;
  ctx.fillRect(80, 322, nameWidth, 2);

  // Role
  ctx.fillStyle = accent;
  ctx.font = '22px "Courier New"';
  ctx.fillText(role, 80, 370);

  // Description — wrap text
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.font = '18px "Courier New"';
  wrapText(ctx, desc, 80, 420, 820, 30);

  // Divider
  ctx.strokeStyle = 'rgba(255,255,255,0.06)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 510);
  ctx.lineTo(820, 510);
  ctx.stroke();

  // URL bottom left
  ctx.fillStyle = `rgba(${r},${g},${b},0.7)`;
  ctx.font = '16px "Courier New"';
  ctx.fillText('→ ' + url, 80, 550);

  // Decorative corner element — right side
  drawCornerDeco(ctx, W - 200, 180, accent, r, g, b);

  // Terminal cursor blink effect (static)
  ctx.fillStyle = accent;
  ctx.fillRect(80 + ctx.measureText(name).width + 8, 268, 12, 52);
}

// ── VARIANT 2: Grid Blueprint
function renderGrid(name, role, desc, url, accent, r, g, b) {
  ctx.fillStyle = '#020810';
  ctx.fillRect(0, 0, W, H);

  // Grid lines
  ctx.strokeStyle = `rgba(${r},${g},${b},0.06)`;
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 40) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Crosshair dots at intersections (sparse)
  ctx.fillStyle = `rgba(${r},${g},${b},0.15)`;
  for (let x = 0; x <= W; x += 120) {
    for (let y = 0; y <= H; y += 120) {
      ctx.beginPath();
      ctx.arc(x, y, 2, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  // Center glow
  const cg = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, 600);
  cg.addColorStop(0, `rgba(${r},${g},${b},0.08)`);
  cg.addColorStop(1, 'transparent');
  ctx.fillStyle = cg;
  ctx.fillRect(0, 0, W, H);

  // Top bar
  ctx.fillStyle = accent;
  ctx.fillRect(0, 0, W, 4);

  // Left panel
  ctx.fillStyle = `rgba(${r},${g},${b},0.05)`;
  ctx.fillRect(0, 0, 380, H);
  ctx.strokeStyle = `rgba(${r},${g},${b},0.15)`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(380, 0); ctx.lineTo(380, H); ctx.stroke();

  // Logo in left panel
  if (logoImg) {
    const ls = 140;
    const lx = (380 - ls) / 2, ly = 80;
    const lg = ctx.createRadialGradient(lx+ls/2, ly+ls/2, 0, lx+ls/2, ly+ls/2, ls);
    lg.addColorStop(0, `rgba(${r},${g},${b},0.25)`);
    lg.addColorStop(1, 'transparent');
    ctx.fillStyle = lg;
    ctx.fillRect(lx-20, ly-20, ls+40, ls+40);
    ctx.drawImage(logoImg, lx, ly, ls, ls);
  }

  // Left panel text
  ctx.fillStyle = accent;
  ctx.font = 'bold 13px "Courier New"';
  ctx.textAlign = 'center';
  ctx.fillText('FOSHT', 190, 260);
  ctx.fillStyle = 'rgba(255,255,255,0.3)';
  ctx.font = '10px "Courier New"';
  ctx.fillText('SYSTEM v2.0', 190, 280);

  // Stats
  const stats = ['React · Next.js', 'Tailwind · Node.js', 'AI Integration'];
  stats.forEach((s, i) => {
    ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
    ctx.font = '11px "Courier New"';
    ctx.fillText(s, 190, 340 + i * 24);
  });

  ctx.textAlign = 'left';

  // Right panel content
  const rx = 420;

  ctx.fillStyle = `rgba(${r},${g},${b},0.08)`;
  roundRect(ctx, rx, 60, 720, 42, 4);
  ctx.fill();
  ctx.strokeStyle = `rgba(${r},${g},${b},0.2)`;
  ctx.lineWidth = 1;
  roundRect(ctx, rx, 60, 720, 42, 4);
  ctx.stroke();

  ctx.fillStyle = accent;
  ctx.font = '11px "Courier New"';
  ctx.fillText('$ whoami — IDENTITY VERIFIED', rx + 20, 86);

  ctx.fillStyle = '#fff';
  ctx.font = `bold 58px "Courier New"`;
  ctx.fillText(name, rx, 200);

  ctx.fillStyle = accent;
  ctx.font = '20px "Courier New"';
  ctx.fillText('// ' + role, rx, 244);

  ctx.fillStyle = 'rgba(255,255,255,0.4)';
  ctx.font = '16px "Courier New"';
  wrapText(ctx, desc, rx, 295, 680, 28);

  // Horizontal rule
  ctx.strokeStyle = `rgba(${r},${g},${b},0.2)`;
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(rx, 480); ctx.lineTo(rx + 680, 480); ctx.stroke();

  // URL
  ctx.fillStyle = `rgba(${r},${g},${b},0.6)`;
  ctx.font = '15px "Courier New"';
  ctx.fillText('> ' + url, rx, 530);

  // Bottom right tag
  ctx.fillStyle = `rgba(${r},${g},${b},0.3)`;
  ctx.font = '11px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText('LAMPUNG, INDONESIA', W - 40, H - 30);
  ctx.textAlign = 'left';
}

// ── VARIANT 3: Minimal Clean
function renderMinimal(name, role, desc, url, accent, r, g, b) {
  ctx.fillStyle = '#060606';
  ctx.fillRect(0, 0, W, H);

  // Subtle noise-like texture (horizontal lines)
  ctx.globalAlpha = 0.02;
  for (let y = 0; y < H; y += 3) {
    ctx.fillStyle = Math.random() > 0.5 ? '#fff' : '#000';
    ctx.fillRect(0, y, W, 1);
  }
  ctx.globalAlpha = 1;

  // Single accent line left
  ctx.fillStyle = accent;
  ctx.fillRect(0, 0, 4, H);

  // Top left dot
  ctx.fillStyle = accent;
  ctx.beginPath();
  ctx.arc(60, 60, 6, 0, Math.PI * 2);
  ctx.fill();

  // Logo — large, right side
  if (logoImg) {
    const ls = 200;
    ctx.globalAlpha = 0.15;
    ctx.drawImage(logoImg, W - ls - 80, H/2 - ls/2, ls, ls);
    ctx.globalAlpha = 1;
  }

  // Name — huge
  ctx.fillStyle = '#ffffff';
  ctx.font = `bold 80px "Courier New"`;
  ctx.fillText(name, 80, 240);

  // Role with accent
  ctx.fillStyle = accent;
  ctx.font = '24px "Courier New"';
  ctx.fillText(role, 80, 300);

  // Thin line
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(80, 330);
  ctx.lineTo(700, 330);
  ctx.stroke();

  // Description
  ctx.fillStyle = 'rgba(255,255,255,0.35)';
  ctx.font = '18px "Courier New"';
  wrapText(ctx, desc, 80, 375, 750, 30);

  // Bottom URL
  ctx.fillStyle = `rgba(${r},${g},${b},0.5)`;
  ctx.font = '16px "Courier New"';
  ctx.fillText(url, 80, H - 50);

  // Bottom right — small tag
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.font = '12px "Courier New"';
  ctx.textAlign = 'right';
  ctx.fillText('PORTFOLIO · 2025', W - 60, H - 50);
  ctx.textAlign = 'left';
}

// ── HELPERS
function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  for (let i = 0; i < words.length; i++) {
    const test = line + words[i] + ' ';
    if (ctx.measureText(test).width > maxWidth && i > 0) {
      ctx.fillText(line, x, y);
      line = words[i] + ' ';
      y += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

function roundRect(ctx, x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h - r);
  ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
  ctx.lineTo(x + r, y + h);
  ctx.quadraticCurveTo(x, y + h, x, y + h - r);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
}

function drawCornerDeco(ctx, cx, cy, accent, r, g, b) {
  // Decorative circuit-like corner element
  ctx.strokeStyle = `rgba(${r},${g},${b},0.2)`;
  ctx.lineWidth = 1;

  // Concentric partial arcs
  for (let i = 1; i <= 4; i++) {
    ctx.beginPath();
    ctx.arc(cx, cy, i * 35, Math.PI, Math.PI * 1.5);
    ctx.stroke();
  }

  // Cross lines
  ctx.beginPath();
  ctx.moveTo(cx - 150, cy);
  ctx.lineTo(cx, cy);
  ctx.lineTo(cx, cy - 150);
  ctx.stroke();

  // Center dot
  ctx.fillStyle = accent;
  ctx.globalAlpha = 0.4;
  ctx.beginPath();
  ctx.arc(cx, cy, 4, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;
}

function download() {
  const link = document.createElement('a');
  link.download = 'og-image.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
}

// Initial render
render();
</script>
</body>
</html>
