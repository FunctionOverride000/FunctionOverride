name: AI Agent - Auto Publish Articles

on:
  schedule:
    # Setiap 6 jam: jam 00:00, 06:00, 12:00, 18:00 UTC
    - cron: '0 0,6,12,18 * * *'
  
  # Bisa juga trigger manual dari GitHub Actions tab
  workflow_dispatch:

jobs:
  run-agent:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Trigger AI Agent
        run: |
          echo "Triggering AI Agent at $(date)"
          
          RESPONSE=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "https://fosht.vercel.app/api/agent?secret=${{ secrets.AGENT_SECRET }}")
          
          echo "HTTP Status: $RESPONSE"
          echo "Response:"
          cat /tmp/response.json
          
          # Fail jika bukan 200
          if [ "$RESPONSE" != "200" ]; then
            echo "Agent failed with status $RESPONSE"
            exit 1
          fi
          
          echo "Agent completed successfully"name: AI Agent - Auto Publish Articles

